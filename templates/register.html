<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-lg-5">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">
                            Smart Nutrition
                        </h2>

                        <p class="text-muted">
                            Athlete Registration System
                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-3">

                            <input
                                type="text"
                                name="full_name"
                                class="form-control form-control-lg"
                                placeholder="Full Name"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <input
                                type="email"
                                name="email"
                                class="form-control form-control-lg"
                                placeholder="Email"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <input
                                type="password"
                                name="password"
                                class="form-control form-control-lg"
                                placeholder="Password"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <input
                                type="number"
                                step="0.1"
                                name="weight"
                                class="form-control form-control-lg"
                                placeholder="Weight (kg)"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <select
                                name="sport_type"
                                class="form-select form-select-lg"
                            >

                                <option value="">
                                    Select Sport Type
                                </option>

                                <option value="Boxing">
                                    Boxing
                                </option>

                                <option value="Muaythai">
                                    Muaythai
                                </option>

                            </select>

                        </div>

                        <div class="mb-4">

                            <select
                                name="training_phase"
                                class="form-select form-select-lg"
                            >

                                <option value="">
                                    Select Training Phase
                                </option>

                                <option value="NORMAL">
                                    Normal Training
                                </option>

                                <option value="CUTTING">
                                    Weight Cutting
                                </option>

                            </select>

                        </div>

                        <div class="d-grid mb-3">

                            <button class="btn btn-dark btn-lg">
                                Register
                            </button>

                        </div>

                    </form>

                    <div class="text-center">

                        <a href="/login" class="text-decoration-none">
                            Already have account? Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
