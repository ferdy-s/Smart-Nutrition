<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-5">

                        <div class="mb-4">

                            <h2 class="fw-bold">
                                Edit Food
                            </h2>

                            <p class="text-muted">
                                Update nutrition food information
                            </p>

                        </div>

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Food Name
                                </label>

                                <input
                                    type="text"
                                    name="food_name"
                                    value="{{ food.food_name }}"
                                    class="form-control form-control-lg"
                                    required
                                >

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Calories
                                    </label>

                                    <input
                                        type="number"
                                        step="0.1"
                                        name="calories"
                                        value="{{ food.calories }}"
                                        class="form-control"
                                        required
                                    >

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Sugar
                                    </label>

                                    <input
                                        type="number"
                                        step="0.1"
                                        name="sugar"
                                        value="{{ food.sugar }}"
                                        class="form-control"
                                        required
                                    >

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-4 mb-3">

                                    <label class="form-label">
                                        Protein
                                    </label>

                                    <input
                                        type="number"
                                        step="0.1"
                                        name="protein"
                                        value="{{ food.protein }}"
                                        class="form-control"
                                        required
                                    >

                                </div>

                                <div class="col-md-4 mb-3">

                                    <label class="form-label">
                                        Carbohydrates
                                    </label>

                                    <input
                                        type="number"
                                        step="0.1"
                                        name="carbohydrates"
                                        value="{{ food.carbohydrates }}"
                                        class="form-control"
                                        required
                                    >

                                </div>

                                <div class="col-md-4 mb-4">

                                    <label class="form-label">
                                        Fat
                                    </label>

                                    <input
                                        type="number"
                                        step="0.1"
                                        name="fat"
                                        value="{{ food.fat }}"
                                        class="form-control"
                                        required
                                    >

                                </div>

                            </div>

                            <div class="mb-4">

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        name="cocok_normal"
                                        {% if food.cocok_normal %}checked{% endif %}
                                    >

                                    <label class="form-check-label">
                                        Suitable for Normal Training
                                    </label>

                                </div>

                                <div class="form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        name="cocok_cutting"
                                        {% if food.cocok_cutting %}checked{% endif %}
                                    >

                                    <label class="form-check-label">
                                        Suitable for Weight Cutting
                                    </label>

                                </div>

                            </div>

                            <div class="d-grid gap-2">

                                <button class="btn btn-dark btn-lg">
                                    Update Food
                                </button>

                                <a href="/" class="btn btn-light border">
                                    Back Dashboard
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
